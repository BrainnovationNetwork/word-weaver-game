<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Word Weaver | Brainnovation</title>
<meta name="theme-color" content="#0d1420">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="format-detection" content="telephone=no">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'Outfit',system-ui,sans-serif;
  --bg:#0d1420;--surface:rgba(255,255,255,0.04);--surface-raised:rgba(255,255,255,0.07);
  --text:#E6E7E8;--text-dim:rgba(230,231,232,0.52);--text-faint:rgba(230,231,232,0.22);
  --teal:#6DCDB8;--blue:#407EC9;--gold:#F1B434;--pink:#E06287;--lb:#8BD3E6;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --t-spring:0.45s cubic-bezier(0.34,1.56,0.64,1);
  --t-ease:0.4s cubic-bezier(0.25,0.1,0.25,1);
  --t-out:0.3s cubic-bezier(0.4,0,1,1);
}
html{height:100%;height:-webkit-fill-available;height:100dvh;}
body{height:100%;height:-webkit-fill-available;overflow:hidden;font-family:var(--ff-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none;user-select:none;-webkit-user-select:none;touch-action:pan-x pan-y;-webkit-touch-callout:none;cursor:default;position:fixed;width:100%;}
body::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px;}
.prog-track{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.04);z-index:300}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--blue),var(--gold));transition:width 0.4s var(--t-ease);position:relative;}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#E6E7E8;box-shadow:0 0 10px 3px rgba(230,231,232,0.35);}
.deck{position:relative;width:100%;height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden;z-index:1}
.slide{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top) + 2rem) 1.5rem calc(var(--safe-bot) + 2rem);text-align:center;opacity:0;pointer-events:none;z-index:1;transform:translateY(28px) scale(0.98);transition:none;}
.slide.active{opacity:1;pointer-events:auto;transform:none;z-index:10}
.slide.entering{will-change:transform,opacity;transition:opacity 0.55s var(--t-ease),transform 0.55s var(--t-ease)}
.slide.exiting-up{will-change:transform,opacity;opacity:0;transform:translateY(-36px) scale(0.97);z-index:5;transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}
.slide.exiting-down{will-change:transform,opacity;opacity:0;transform:translateY(36px) scale(0.97);z-index:5;transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}
.game-slide{padding:0;justify-content:flex-start;overflow:hidden;}
.slide.active .sg{opacity:0;animation:sgIn 0.5s forwards}
@keyframes sgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide.active .sg:nth-child(1){animation-delay:.06s}.slide.active .sg:nth-child(2){animation-delay:.13s}.slide.active .sg:nth-child(3){animation-delay:.21s}.slide.active .sg:nth-child(4){animation-delay:.30s}.slide.active .sg:nth-child(5){animation-delay:.38s}.slide.active .sg:nth-child(6){animation-delay:.46s}.slide.active .sg:nth-child(7){animation-delay:.54s}
button{-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;border:none;cursor:pointer;}
button:focus-visible{outline:2px solid var(--teal);outline-offset:3px}
/* HERO */
.hero-inner{position:relative;z-index:2;max-width:600px;width:100%}
.hero-logo{height:38px;width:auto;margin-bottom:2rem;display:block;margin-left:auto;margin-right:auto;}
.hero-title{font-family:var(--ff-display);font-size:clamp(2.8rem,9vw,5.2rem);line-height:1.05;font-weight:400;margin-bottom:1.4rem;}
.hero-title em{font-style:italic;color:var(--teal)}
.hero-sub{font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--text-dim);line-height:1.8;font-weight:300;max-width:420px;margin:0 auto 2.6rem;}
.hero-cta{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.9rem;border-radius:100px;background:rgba(230,231,232,.05);border:1px solid rgba(230,231,232,.11);color:var(--text);font-family:var(--ff-body);font-size:.84rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.hero-cta:hover{background:rgba(230,231,232,.09);border-color:rgba(230,231,232,.2);transform:translateY(-1px)}.hero-cta:active{transform:scale(.96)}
.hero-cta svg{transition:transform .3s}.hero-cta:hover svg{transform:translateX(3px)}
.hero-ref{font-size:.64rem;color:var(--text-faint);font-style:italic;margin-top:1.4rem}
/* HOWTO */
.howto-inner{position:relative;z-index:2;max-width:480px;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100dvh - 6rem);scrollbar-width:none;-ms-overflow-style:none;}
.howto-inner::-webkit-scrollbar{display:none}
.howto-title{font-family:var(--ff-display);font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.15;font-weight:400;margin-bottom:1.1rem;}
.rules{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1.2rem}
.rule{display:flex;align-items:flex-start;gap:.9rem;padding:.6rem .9rem;border:1px solid rgba(255,255,255,.05);border-radius:var(--r-md);background:var(--surface);text-align:left;}
.rule-icon{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-top:.05rem}
.rule-icon.r1{background:rgba(109,205,184,.12);border:1px solid rgba(109,205,184,.22)}.rule-icon.r2{background:rgba(241,180,52,.12);border:1px solid rgba(241,180,52,.22)}.rule-icon.r3{background:rgba(224,98,135,.12);border:1px solid rgba(224,98,135,.22)}
.rule-copy{font-size:.82rem;line-height:1.55;color:var(--text-dim);font-weight:300}.rule-copy strong{color:var(--text);font-weight:500}
.howto-btn{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.9rem;border-radius:100px;background:rgba(109,205,184,.07);border:1px solid rgba(109,205,184,.2);color:var(--teal);font-family:var(--ff-body);font-size:.84rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.howto-btn:hover{background:rgba(109,205,184,.13);border-color:rgba(109,205,184,.35);transform:translateY(-1px)}.howto-btn:active{transform:scale(.96)}
/* AGE SELECTOR */
.age-inner{position:relative;z-index:2;max-width:440px;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100vh - 6rem);max-height:calc(100dvh - 6rem);scrollbar-width:none;-ms-overflow-style:none;}
.age-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.9rem;}
.age-title{font-family:var(--ff-display);font-size:clamp(1.6rem,5vw,2.2rem);line-height:1.15;font-weight:400;margin-bottom:.55rem;}
.age-sub{font-size:.82rem;color:var(--text-dim);font-weight:300;line-height:1.6;margin-bottom:1.6rem;max-width:360px;margin-left:auto;margin-right:auto;}
.age-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.4rem;width:100%;}
.age-btn{padding:.75rem .5rem;border-radius:var(--r-md);border:1.5px solid rgba(255,255,255,.08);background:var(--surface);color:var(--text-dim);font-family:var(--ff-body);font-size:.84rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:all var(--t-ease);line-height:1.2;text-align:center;}
.age-btn:hover{border-color:rgba(109,205,184,.35);background:rgba(109,205,184,.06);color:var(--teal);}.age-btn:active{transform:scale(.95);}
.age-btn.selected{border-color:var(--teal);background:rgba(109,205,184,.12);color:var(--teal);}
.age-range{display:block;font-size:1rem;font-weight:600;margin-bottom:.15rem;}
.age-label{display:block;font-size:.62rem;color:var(--text-faint);font-weight:400;letter-spacing:.04em;}
.age-btn.selected .age-label{color:rgba(109,205,184,.6);}
.age-proceed{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.9rem;border-radius:100px;background:rgba(109,205,184,.07);border:1px solid rgba(109,205,184,.2);color:var(--teal);font-family:var(--ff-body);font-size:.84rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);opacity:.35;pointer-events:none;}
.age-proceed.ready{opacity:1;pointer-events:auto;}.age-proceed.ready:hover{background:rgba(109,205,184,.13);border-color:rgba(109,205,184,.35);transform:translateY(-1px)}.age-proceed.ready:active{transform:scale(.96)}
.age-inner::-webkit-scrollbar{display:none}
.age-note{font-size:.62rem;color:var(--text-faint);font-style:italic;margin-top:1rem;line-height:1.5;}
/* GAME */
.g-header{position:relative;z-index:2;width:100%;padding:calc(var(--safe-top) + .65rem) 1.2rem 0;flex-shrink:0;}
.g-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.g-round-label{font-size:.52rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--text-faint);}
.g-pills{display:flex;align-items:center;gap:.45rem;}
.g-pill{font-size:.62rem;font-weight:600;padding:.2rem .6rem;letter-spacing:.04em;border-radius:100px;border:1px solid rgba(255,255,255,.08);color:var(--text-dim);}.g-pill b{color:var(--gold);}
.g-category-zone{padding:.15rem 0 .55rem;}.g-category-super{font-size:.46rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.3rem;}
.g-category-name{font-family:var(--ff-display);font-size:clamp(1.6rem,6.5vw,2.4rem);font-weight:600;line-height:1.05;color:var(--text);letter-spacing:-.01em;}
.timer-ring-wrap{position:relative;z-index:2;width:100%;display:flex;justify-content:center;align-items:center;padding:.2rem 1.2rem .3rem;flex-shrink:0;}
.timer-track{width:100%;height:6px;border-radius:100px;background:rgba(255,255,255,.06);overflow:hidden;position:relative;}
.timer-fill{height:100%;border-radius:100px;background:var(--teal);transform-origin:left;transition:transform .05s linear,background .3s;}.timer-fill.warn{background:var(--gold);}.timer-fill.danger{background:var(--pink);}
.word-grid{position:relative;z-index:2;flex:1;width:100%;display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;padding:.25rem 1rem;align-content:start;overflow:hidden;min-height:0;}
.word-tile:last-child:nth-child(odd){grid-column:span 2;}
.word-tile{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:62px;padding:.55rem .6rem;border-radius:var(--r-lg);border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:var(--ff-body);font-size:.92rem;font-weight:500;color:var(--text);text-align:center;line-height:1.2;transition:background .12s,border-color .12s,transform .08s,opacity .18s,box-shadow .18s;}
.word-tile:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);}.word-tile:active{transform:scale(.92);background:rgba(255,255,255,.09);}
.word-tile.correct{border-color:var(--teal);background:rgba(109,205,184,.15);animation:tileCorrect .3s ease forwards;}
.word-tile.wrong{border-color:var(--pink);background:rgba(224,98,135,.12);animation:tileWrong .3s ease forwards;}
.word-tile.decoy{border-color:rgba(255,255,255,.04);background:rgba(255,255,255,.02);opacity:.35;}
.word-tile.flood{border-color:rgba(224,98,135,.3);background:rgba(224,98,135,.07);animation:floodIn .55s cubic-bezier(0.34,1.2,0.64,1);}
@keyframes tileCorrect{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(109,205,184,.5)}40%{transform:scale(1.08);box-shadow:0 0 0 6px rgba(109,205,184,.2)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(109,205,184,0)}}
@keyframes tileWrong{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
@keyframes floodIn{0%{opacity:0;transform:scale(.75);border-color:rgba(224,98,135,.6);background:rgba(224,98,135,.25)}30%{opacity:1;transform:scale(1.04);background:rgba(224,98,135,.18)}100%{transform:scale(1);border-color:rgba(224,98,135,.3);background:rgba(224,98,135,.07)}}
.flood-flash{position:absolute;inset:0;pointer-events:none;z-index:4000;opacity:0}
.flood-flash.fire{background:radial-gradient(ellipse at 50% 40%,rgba(224,98,135,.25) 0%,transparent 65%);opacity:1;animation:fbFade .5s ease forwards}
@keyframes fbFade{0%{opacity:1}100%{opacity:0}}
.streak-toast{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-family:var(--ff-display);font-size:1.3rem;font-weight:600;color:var(--text);pointer-events:none;z-index:5000;opacity:0;white-space:nowrap;background:rgba(13,20,32,.9);border:1px solid rgba(109,205,184,.45);border-radius:100px;padding:.38rem 1.1rem;box-shadow:0 4px 24px rgba(109,205,184,.18);}
.streak-toast.show{animation:streakAnim .9s ease forwards}
@keyframes streakAnim{0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.8)}20%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.06)}60%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}85%{opacity:.7;transform:translateX(-50%) translateY(-10px) scale(.93)}100%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.86)}}
.game-footer{position:relative;z-index:2;width:100%;padding:.3rem 1rem calc(var(--safe-bot) + .75rem);flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.5rem;}
.footer-stat{display:flex;flex-direction:column;align-items:center;gap:.08rem;}
.footer-score{font-family:var(--ff-display);font-size:1.8rem;font-weight:600;color:var(--gold);line-height:1;}
.footer-flood{font-family:var(--ff-display);font-size:1.8rem;font-weight:600;color:var(--pink);line-height:1;}
.footer-label{font-size:.46rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);}
.footer-divider{width:1px;height:36px;background:rgba(255,255,255,.08);}
.countdown-wrap{position:absolute;inset:0;z-index:8000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
.countdown-wrap.on{opacity:1}
.countdown-n{font-family:var(--ff-display);font-size:clamp(5rem,18vw,9rem);font-weight:600;opacity:0;color:#E6E7E8;}
.countdown-n.pop{animation:cntPop .6s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes cntPop{0%{opacity:0;transform:scale(.45)}25%{opacity:1;transform:scale(1.18)}55%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.82)}}
.spark{position:absolute;pointer-events:none;z-index:9000;width:5px;height:5px;border-radius:50%;opacity:0;}
.spark.go{animation:sparkGo .65s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes sparkGo{0%{opacity:0;transform:translate(0,0) scale(0)}20%{opacity:1;transform:translate(calc(var(--dx)*.3),calc(var(--dy)*.3)) scale(1)}80%{opacity:.6;transform:translate(var(--dx),var(--dy)) scale(.8)}100%{opacity:0;transform:translate(calc(var(--dx)*1.3),calc(var(--dy)*1.3)) scale(0)}}
/* RESULT */
.result-inner{position:relative;z-index:2;width:100%;max-width:440px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;max-height:calc(100dvh - 4rem);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:.5rem;}
.result-inner::-webkit-scrollbar{display:none}
.res-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1.2rem;}
.score-ring-wrap{position:relative;width:160px;height:160px;flex-shrink:0;margin-bottom:1.1rem}
.score-ring-svg{transform:rotate(-90deg);overflow:visible}
.score-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:6}
.score-fill{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:471.24;stroke-dashoffset:471.24;transition:stroke-dashoffset 1.3s cubic-bezier(0.25,0.1,0.25,1) .2s,stroke .4s}
.score-center{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.score-num{font-family:var(--ff-display);font-size:3rem;font-weight:600;line-height:1;letter-spacing:-.04em}
.score-unit{font-size:.52rem;color:var(--text-faint);letter-spacing:.08em}
.res-grade-label{font-family:var(--ff-display);font-size:1.45rem;font-weight:600;line-height:1.1;margin-bottom:.25rem;}
.res-grade-sub{font-size:.78rem;color:var(--text-dim);font-weight:300;margin-bottom:1.3rem}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;width:100%;margin-bottom:1.2rem}
.res-stat{background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-md);padding:.75rem .5rem;text-align:center;}
.res-stat-n{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;line-height:1}
.res-stat-l{font-size:.54rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-top:.22rem}
.res-insight{width:100%;padding:.8rem 1rem;margin-bottom:1.2rem;border-left:2px solid var(--teal);background:rgba(109,205,184,.03);text-align:left;}
.res-insight-lbl{font-size:.52rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem}
.res-insight-txt{font-size:.79rem;line-height:1.6;color:var(--text-dim);font-weight:300}
.res-actions{display:flex;gap:.45rem;justify-content:center;flex-wrap:wrap;width:100%;margin-top:.2rem}
.btn-primary{display:inline-flex;align-items:center;gap:.42rem;padding:.76rem 1.45rem;border-radius:100px;background:rgba(109,205,184,.08);border:1px solid rgba(109,205,184,.25);color:var(--teal);font-family:var(--ff-body);font-size:.82rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.btn-primary:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.4);transform:translateY(-1px)}.btn-primary:active{transform:scale(.96)}
.btn-ghost{display:inline-flex;align-items:center;gap:.42rem;padding:.76rem 1.05rem;border-radius:100px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text-dim);font-family:var(--ff-body);font-size:.82rem;font-weight:400;cursor:pointer;touch-action:manipulation;transition:border-color var(--t-ease),color var(--t-ease),transform var(--t-ease);}
.btn-ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}.btn-ghost:active{transform:scale(.96)}
/* FINAL */
.final-inner{position:relative;z-index:2;max-width:500px;width:100%;overflow-y:auto;max-height:calc(100dvh - 4rem);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;-ms-overflow-style:none;}
.final-inner::-webkit-scrollbar{display:none}
.final-rule{width:40px;height:1px;background:rgba(255,255,255,.08);margin:0 auto 1.5rem}
.final-title{font-family:var(--ff-display);font-size:clamp(2rem,6vw,3.2rem);line-height:1.1;font-weight:400;margin-bottom:1.3rem;color:var(--text);}
.final-title em{font-style:italic;color:var(--teal)}
/* SCORE CONTEXT — the meaningful part */
.score-context{width:100%;border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.07);overflow:hidden;margin-bottom:1.3rem;}
.sctx-top{padding:1.1rem 1.2rem .8rem;background:rgba(255,255,255,.03);display:flex;align-items:flex-start;gap:1rem;}
.sctx-num{font-family:var(--ff-display);font-size:3.6rem;font-weight:600;line-height:1;flex-shrink:0;}
.sctx-right{display:flex;flex-direction:column;justify-content:center;text-align:left;}
.sctx-eyebrow{font-size:.5rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.28rem;}
.sctx-tier{font-family:var(--ff-display);font-size:1.25rem;font-weight:600;line-height:1.1;margin-bottom:.18rem;}
.sctx-age{font-size:.7rem;color:var(--text-dim);font-weight:300;}
.sctx-bar-wrap{padding:.1rem 1.2rem .8rem;background:rgba(255,255,255,.03);}
.sctx-bar-track{width:100%;height:5px;border-radius:100px;background:rgba(255,255,255,.06);position:relative;overflow:hidden;}
.sctx-bar-fill{height:100%;border-radius:100px;transition:width 1.1s cubic-bezier(0.25,0.1,0.25,1) .5s;width:0;}
.sctx-markers{display:flex;justify-content:space-between;margin-top:.4rem;}
.sctx-marker{font-size:.52rem;color:var(--text-faint);}
.sctx-body{padding:.85rem 1.2rem 1.1rem;border-top:1px solid rgba(255,255,255,.05);text-align:left;}
.sctx-interp{font-size:.82rem;line-height:1.7;color:var(--text-dim);font-weight:300;margin-bottom:.7rem;}
.sctx-interp strong{color:var(--text);font-weight:500;}
.sctx-caveat{font-size:.7rem;line-height:1.6;color:var(--text-faint);font-style:italic;padding:.55rem .75rem;border-radius:var(--r-sm);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:.5rem;}
.sctx-cite{font-size:.58rem;color:var(--text-faint);font-style:italic;}
.final-chips{display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1.3rem}
.chip{font-size:.68rem;font-weight:500;padding:.3rem .85rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim);}
.chip.good{border-color:rgba(109,205,184,.3);color:var(--teal);background:rgba(109,205,184,.08)}
.final-insights{list-style:none;margin-bottom:1.6rem}
.final-insights li{font-size:.88rem;color:var(--text-dim);line-height:1.75;font-weight:300;padding:.18rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.final-insights li:last-child{border-bottom:none}
.hist-final-wrap{width:100%;margin-bottom:1.8rem;}
.hist-final-title{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.9rem;}
.hist-no-history{font-size:.78rem;color:rgba(230,231,232,0.35);font-weight:300;font-style:italic;text-align:center;padding:.6rem 0;}
.hist-session-row{position:relative;padding:.75rem .9rem;border-radius:var(--r-md);border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,0.03);margin-bottom:.5rem;}
.hist-session-row.is-current{border-color:rgba(109,205,184,.25);background:rgba(109,205,184,.05);}
.hist-session-row.is-current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:2px 0 0 2px;background:var(--teal);}
.hist-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem;}
.hist-row-score{font-family:var(--ff-display);font-size:1.45rem;font-weight:600;line-height:1;}
.hist-row-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.18rem;}
.hist-row-date{font-size:.52rem;color:var(--text-faint);}
.hist-row-tag{font-size:.48rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.14rem .5rem;border-radius:100px;}
.hist-row-tag.now{background:rgba(109,205,184,.1);color:var(--teal);border:1px solid rgba(109,205,184,.2);}
.hist-row-tag.prev{background:rgba(255,255,255,.04);color:rgba(230,231,232,0.35);border:1px solid rgba(255,255,255,.06);}
.hist-phase-chips{display:flex;gap:.35rem;flex-wrap:wrap;}
.hist-ph-chip{font-size:.6rem;font-weight:500;padding:.2rem .55rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:rgba(230,231,232,0.4);}
.hist-ph-chip.good{border-color:rgba(109,205,184,.25);color:var(--teal);background:rgba(109,205,184,.07);}
.hist-trend-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.6rem;font-weight:600;letter-spacing:.06em;padding:.25rem .7rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:rgba(230,231,232,0.4);margin-bottom:.75rem;}
.hist-trend-badge.up{color:var(--teal);border-color:rgba(109,205,184,.2);background:rgba(109,205,184,.05);}
.hist-trend-badge.down{color:var(--pink);border-color:rgba(224,98,135,.2);background:rgba(224,98,135,.05);}
.hist-analysis-wrap{width:100%;margin-top:.85rem;padding:.75rem .9rem;border-radius:var(--r-md);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.06);border-left:2px solid var(--teal);}
.hist-analysis-label{font-size:.5rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:.35rem;}
.hist-analysis-text{font-size:.78rem;line-height:1.6;color:var(--text-dim);font-weight:300;}
.final-cta{display:inline-flex;align-items:center;gap:.5rem;padding:.9rem 1.8rem;border-radius:100px;background:rgba(109,205,184,.08);border:1px solid rgba(109,205,184,.25);color:var(--teal);font-family:var(--ff-body);font-size:.9rem;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);text-decoration:none;}
.final-cta:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.4);transform:translateY(-1px)}.final-cta:active{transform:scale(.96)}
.final-logo{height:24px;width:auto;opacity:.18;margin-top:1.5rem;display:block;margin-left:auto;margin-right:auto;}
@media(prefers-reduced-motion:reduce){
  .slide.entering,.slide.exiting-up,.slide.exiting-down{transition:opacity .18s!important;transform:none!important}
  .slide.active .sg{animation:none!important;opacity:1!important}
  .word-tile.correct,.word-tile.wrong{animation:none!important}
  .streak-toast,.countdown-n,.spark{animation:none!important;opacity:0!important}
  .score-fill{transition:stroke-dashoffset .4s,stroke .2s!important}
  .sctx-bar-fill{transition:width .4s!important}
}
</style>
</head>

function getAgeInterpretation(total, ageKey){
  const norm = AGE_NORMS[ageKey] || AGE_NORMS['40-49'];
  for(const tier of norm.tiers){
    if(total >= tier.min) return tier;
  }
  return norm.tiers[norm.tiers.length-1];
}

const SPARK_COLS=['#6DCDB8','#8BD3E6','#F1B434','#E06287','#407EC9'];
function sparks(el,n=8){
  const deck=$('deck');if(!deck||!el)return;
  const dr=deck.getBoundingClientRect(),r=el.getBoundingClientRect();
  const cx=r.left-dr.left+r.width/2,cy=r.top-dr.top+r.height/2;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='spark';
    const a=(Math.PI*2/n)*i+(Math.random()-.5)*.7,d=26+Math.random()*34;
    p.style.left=(cx-2.5)+'px';p.style.top=(cy-2.5)+'px';
    p.style.background=SPARK_COLS[i%SPARK_COLS.length];
    p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animationDelay=(i*.025)+'s';deck.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('go'));setTimeout(()=>p.remove(),700);
  }
}
function showStreak(n){
  if(n<4)return;
  const el=$('streakToast');
  el.textContent=n>=8?'Fire! '+n+' correct!':n>=5?'Chain! '+n+' in a row':'';
  if(!el.textContent)return;
  el.className='streak-toast show';setTimeout(()=>el.className='streak-toast',1000);
}

function jumpTo(idx,dir=1){
  if(transitioning)return;
  const all=document.querySelectorAll('.slide');
  const curr=all[slideIdx],nxt=all[idx];if(!nxt)return;
  transitioning=true;curr.classList.remove('active');
  curr.classList.add(dir>0?'exiting-up':'exiting-down');
  nxt.querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
  nxt.style.transform='translateY('+(dir>0?28:-28)+'px) scale(.98)';nxt.style.opacity='0';
  nxt.classList.add('entering');
  requestAnimationFrame(()=>{nxt.classList.add('active');nxt.style.transform='';nxt.style.opacity='';});
  slideIdx=idx;$('progFill').style.width=(idx/(slides.length-1)*100)+'%';
  setTimeout(()=>{curr.classList.remove('exiting-up','exiting-down');nxt.classList.remove('entering');nxt.style.cssText=nxt.style.cssText;nxt.style.willChange='auto';transitioning=false;},560);
}
function go(dir){jumpTo(slideIdx+dir,dir);}

    '<img src="data:image/png;base64,'+LOGO+'" alt="Brainnovation" class="final-logo" aria-hidden="true">'+
    '</div></div>';
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const USED_KEY='brainnovation_ww_used_v1';
function getUsedCats(){try{return JSON.parse(localStorage.getItem(USED_KEY)||'[]');}catch(e){return[];}}
function markUsedCat(name){
  const used=getUsedCats();
  if(!used.includes(name)){used.push(name);try{localStorage.setItem(USED_KEY,JSON.stringify(used));}catch(e){}}
}
function drawCategory(level){
  const pool=CATEGORIES[level]||[];
  if(!pool.length)return CATEGORIES[1][0];
  const used=getUsedCats();
  let avail=pool.filter(c=>!used.includes(c.name));
  if(avail.length===0){
    // Pool exhausted for this level — reset used for this level only, keep other levels
    const otherNames=new Set([1,2,3].filter(l=>l!==level).flatMap(l=>(CATEGORIES[l]||[]).map(c=>c.name)));
    const remaining=getUsedCats().filter(n=>otherNames.has(n));
    try{localStorage.setItem(USED_KEY,JSON.stringify(remaining));}catch(e){}
    avail=pool;
  }
  return avail[Math.floor(Math.random()*avail.length)];
}
function buildGrid(roundIdx){
  const r=ROUNDS[roundIdx];
  const level=roundIdx+1;
  const cat=drawCategory(level);
  markUsedCat(cat.name);
  gs.currentCat=cat;
  const shuffledTargets=shuffle(cat.targets);
  const shuffledDecoys=shuffle(cat.decoys);
  const targetCount=r.gridSize-r.decoyCount;
  gs.currentTargets=shuffledTargets.slice(0,targetCount);
  gs.currentDecoys=shuffledDecoys.slice(0,r.decoyCount);
  gs.tileState={};
  gs.currentTargets.forEach(w=>{gs.tileState[w]='target';});
  gs.currentDecoys.forEach(w=>{gs.tileState[w]='decoy';});
  gs.flood=0;
  const allWords=shuffle([...gs.currentTargets,...gs.currentDecoys]);
  const grid=$('ggrid'+roundIdx);if(!grid)return;
  grid.innerHTML='';
  allWords.forEach(word=>{
    const tile=document.createElement('button');
    tile.className='word-tile';tile.textContent=word;tile.dataset.word=word;tile.style.touchAction='manipulation';
    tile.setAttribute('aria-label',word);
    tile.addEventListener('click',()=>onTileTap(roundIdx,word,tile));
    grid.appendChild(tile);
  });
  const catEl=$('gcat'+roundIdx);if(catEl)catEl.textContent=cat.name;
}

function onTileTap(roundIdx,word,tile){
  if(gs.round!==roundIdx)return;
  const state=gs.tileState[word];
  if(!state||state==='correct'||state==='wrong'||state==='flooded')return;
  if(state==='target'){
    gs.tileState[word]='correct';tile.classList.add('correct');tile.disabled=true;
    gs.answered++;gs.score++;gs.streak++;
    if(gs.streak>gs.maxStreak)gs.maxStreak=gs.streak;
    sparks(tile,5);vib(25);showStreak(gs.streak);
    const sc=$('gscore'+roundIdx);if(sc)sc.textContent=gs.answered;
    const bs=$('gbigscore'+roundIdx);if(bs)bs.textContent=gs.answered;
    if(gs.currentTargets.every(w=>gs.tileState[w]==='correct')){
      // All targets found — flash grid green and end immediately
      const grid=$('ggrid'+roundIdx);
      if(grid){grid.style.transition='background .35s';grid.style.background='rgba(109,205,184,.08)';
        setTimeout(()=>{grid.style.background='';},500);}
      vib([30,40,60,40,30]);
      endRound(roundIdx,'complete');
    }
  }else if(state==='decoy'){
    gs.tileState[word]='wrong';tile.classList.add('wrong');tile.disabled=true;
    gs.wrongCount++;gs.streak=0;vib([20,30,20]);
    setTimeout(()=>{tile.classList.remove('wrong');tile.classList.add('decoy');},350);
  }
}

function floodTile(roundIdx){
  const grid=$('ggrid'+roundIdx);if(!grid)return;
  const remaining=gs.currentTargets.filter(w=>gs.tileState[w]==='target');
  if(remaining.length===0){endRound(roundIdx,'flooded');return;}
  const victim=remaining[Math.floor(Math.random()*remaining.length)];
  gs.tileState[victim]='flooded';
  const tiles=grid.querySelectorAll('.word-tile:not([disabled])');
  tiles.forEach(t=>{if(t.dataset.word===victim){t.classList.add('decoy');t.disabled=true;t.dataset.word='__flooded__';}});
  gs.flood++;
  const gf=$('gflood'+roundIdx);if(gf)gf.textContent=gs.flood;
  const ff=$('floodFlash');
  if(ff){ff.className='flood-flash';ff.offsetHeight;ff.className='flood-flash fire';setTimeout(()=>{ff.className='flood-flash';},600);}
  vib(15);
  if(gs.currentTargets.filter(w=>gs.tileState[w]==='target').length===0){endRound(roundIdx,'flooded');}
}

function startTimer(roundIdx){
  const r=ROUNDS[roundIdx];
  const fill=$('gtimer'+roundIdx);
  gs.timerStart=now();gs.timerDuration=r.timeMs;
  function tick(){
    const elapsed=now()-gs.timerStart;
    const pct=Math.max(0,1-elapsed/gs.timerDuration);
    if(fill){fill.style.transform='scaleX('+pct+')';fill.className='timer-fill'+(pct<0.25?' danger':pct<0.5?' warn':'');}
    if(elapsed>=gs.timerDuration){endRound(roundIdx,'timeout');return;}
    gs.timerRaf=requestAnimationFrame(tick);
  }
  gs.timerRaf=requestAnimationFrame(tick);
}

function stopTimer(){
  if(gs.timerRaf){cancelAnimationFrame(gs.timerRaf);gs.timerRaf=null;}
  if(gs.floodTimer){clearInterval(gs.floodTimer);gs.floodTimer=null;}
}

function startRound(roundIdx){
  stopTimer(); // clear any stale timers from previous round
  gs.round=roundIdx;gs.answered=0;gs.wrongCount=0;gs.streak=0;
  const r=ROUNDS[roundIdx];
  buildGrid(roundIdx);
  const gameSlideIdx=slides.findIndex(s=>s.t==='game'&&s.i===roundIdx);
  transitioning=false;
  const all=document.querySelectorAll('.slide');
  const prev=slideIdx;
  all[prev].classList.remove('active');
  all[prev].classList.add(gameSlideIdx>prev?'exiting-up':'exiting-down');
  all[gameSlideIdx].style.transform='translateY('+(gameSlideIdx>prev?28:-28)+'px) scale(.98)';
  all[gameSlideIdx].style.opacity='0';all[gameSlideIdx].classList.add('entering');
  requestAnimationFrame(()=>{all[gameSlideIdx].classList.add('active');all[gameSlideIdx].style.transform='';all[gameSlideIdx].style.opacity='';});
  slideIdx=gameSlideIdx;$('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
  setTimeout(()=>{
    all[prev].classList.remove('exiting-up','exiting-down');all[gameSlideIdx].classList.remove('entering');transitioning=false;
    setTimeout(()=>countdown(()=>{startTimer(roundIdx);gs.floodTimer=setInterval(()=>floodTile(roundIdx),r.floodInterval);}),200);
  },560);
}

function endRound(roundIdx,reason){
  if(gs.round!==roundIdx)return;
  gs.round=-1; // sentinel — prevents double-trigger from late flood intervals
  stopTimer();
  const totalTargets=gs.currentTargets.length;
  gs.roundScores[roundIdx]=gs.answered;
  gs.roundData[roundIdx]={category:gs.currentCat?gs.currentCat.name:'',correct:gs.answered,wrong:gs.wrongCount,total:totalTargets,reason};
  vib([40,60,80]);
  const resultIdx=slides.findIndex(s=>s.t==='result'&&s.i===roundIdx);
  setTimeout(()=>{
    transitioning=false;
    const all=document.querySelectorAll('.slide');
    all[slideIdx].classList.remove('active');all[slideIdx].classList.add('exiting-up');
    all[resultIdx].querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
    all[resultIdx].style.transform='translateY(28px) scale(.98)';all[resultIdx].style.opacity='0';
    all[resultIdx].classList.add('entering');
    requestAnimationFrame(()=>{all[resultIdx].classList.add('active');all[resultIdx].style.transform='';all[resultIdx].style.opacity='';});
    const prev=slideIdx;slideIdx=resultIdx;$('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
    setTimeout(()=>{all[prev].classList.remove('exiting-up');all[resultIdx].classList.remove('entering');populateResult(roundIdx);},560);
  },400);
}

function scoreGrade(correct,total){
  const pct=total>0?correct/total:0;
  if(pct>=0.9)return{label:'Excellent',color:'#2d9b84'};
  if(pct>=0.7)return{label:'Good',color:'#4DB878'};
  if(pct>=0.5)return{label:'Average',color:'#b88a1a'};
  return{label:'Below Average',color:'#c97850'};
}

function populateResult(roundIdx){
  const d=gs.roundData[roundIdx];if(!d)return;
  const correct=d.correct,wrong=d.wrong,total=d.total;
  const pct=total>0?Math.round(correct/total*100):0;
  const gr=scoreGrade(correct,total);
  const CIRC=2*Math.PI*70;
  const ringPct=Math.max(5,Math.min(100,Math.round(correct/Math.max(total,1)*100)));
  const arc=$('rarc'+roundIdx);
  if(arc){arc.style.stroke=gr.color;setTimeout(()=>{arc.style.strokeDashoffset=(CIRC*(1-ringPct/100)).toFixed(2);},120);}
  const ne=$('rnum'+roundIdx);if(ne){ne.textContent=correct;ne.style.color=gr.color;}
  const gl=$('rgrade'+roundIdx);
  if(gl){
    gl.textContent=d.reason==='complete'&&correct===total?'Perfect!':gr.label;
    gl.style.color=d.reason==='complete'&&correct===total?'var(--teal)':gr.color;
  }
  const gs2=$('rgradeSub'+roundIdx);
  if(gs2){
    const tag=d.reason==='complete'?' · All found! 🎯':d.reason==='timeout'?' · Time\'s up':' · Grid flooded';
    gs2.textContent=(d.category||'')+' – '+ROUNDS[roundIdx].label+tag;
    if(d.reason==='complete')gs2.style.color='var(--teal)';
  }
  const rr=$('rright'+roundIdx);if(rr){rr.textContent=correct;rr.style.color='var(--teal)';}
  const rw=$('rwrong'+roundIdx);if(rw){rw.textContent=wrong;rw.style.color=wrong>2?'var(--pink)':'var(--text)';}
  const rp=$('rpct'+roundIdx);if(rp){rp.innerHTML=pct+'<span style="font-size:.7rem;color:var(--text-faint)">%</span>';}
  const act=$('ract'+roundIdx);
  if(act){
    if(roundIdx<ROUNDS.length-1){
      act.innerHTML='<button class="btn-primary" onclick="sparks(this);setTimeout(()=>startRound('+(roundIdx+1)+'),100)">Round '+(roundIdx+2)+' <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2l5 5-5 5"/></svg></button><button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startRound('+roundIdx+'),100)">Retry</button>';
    }else{
      act.innerHTML='<button class="btn-primary" onclick="sparks(this);setTimeout(doFinal,100)">See My Score <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2l5 5-5 5"/></svg></button><button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startRound('+roundIdx+'),100)">Retry</button>';
    }
  }
}

function renderScoreContext(total,ageKey){
  const bracket=AGE_BRACKETS.find(b=>b.key===ageKey)||{label:'Unknown'};
  const interp=getAgeInterpretation(total,ageKey||'40-49');
  const barColor=interp.color;
  const ctx=$('scoreCtx');if(!ctx)return;
  ctx.innerHTML=
    '<div class="sctx-top">'+
      '<div class="sctx-num" style="color:'+barColor+'">'+total+'</div>'+
      '<div class="sctx-right">'+
        '<div class="sctx-eyebrow">Fluency Score</div>'+
        '<div class="sctx-tier" style="color:'+barColor+'">'+interp.label+'</div>'+
        '<div class="sctx-age">Age group '+bracket.label+' · 3 rounds</div>'+
      '</div>'+
    '</div>'+
    '<div class="sctx-bar-wrap">'+
      '<div class="sctx-bar-track"><div class="sctx-bar-fill" id="sctxBar" style="background:'+barColor+'"></div></div>'+
      '<div class="sctx-markers"><span class="sctx-marker">Low</span><span class="sctx-marker">Typical</span><span class="sctx-marker">Strong</span></div>'+
    '</div>'+
    '<div class="sctx-body">'+
      '<div class="sctx-interp">'+interp.interp+'</div>'+
      '<div class="sctx-caveat">This game uses timed recognition, not the unconstrained verbal production used in clinical settings. Scores reflect semantic access speed under pressure — a related but different measure. State factors (sleep, stress, focus) can shift your score by 3–5 words in either direction on any given day.</div>'+
      '<div class="sctx-cite">Norms adapted from Tombaugh et al. (1999) and Gladsjo et al. (1999). Not a clinical assessment.</div>'+
    '</div>';
  setTimeout(()=>{
    const bar=$('sctxBar');if(bar)bar.style.width=interp.barPct+'%';
  },100);
}

function doFinal(){
  const fi=slides.findIndex(s=>s.t==='final');transitioning=false;jumpTo(fi,1);
  setTimeout(()=>{
    const total=gs.roundScores.reduce((a,b)=>a+(b||0),0);
    renderScoreContext(total,gs.ageBracket);
    histCommit(total,gs.roundScores,gs.roundData,gs.ageBracket);
    renderFinalHistory(total,gs.roundScores);
    const fc=$('fchips');
    if(fc){fc.innerHTML=['<span class="chip">Max streak: '+gs.maxStreak+'</span>',...gs.roundScores.map((s,i)=>'<span class="chip'+(s>=5?' good':'')+'">R'+(i+1)+': '+s+'</span>')].join('');}
    const fi2=$('finsights');
    if(fi2){
      const lines=total>=15
        ?['A high fluency score reflects rapid, efficient semantic retrieval across all three rounds under increasing pressure.','Semantic access speed at this level is associated with strong verbal memory and robust left-hemisphere network connectivity.','Regular fluency practice reinforces the retrieval pathways between semantic storage and language production areas.']
        :total>=9
        ?['A solid fluency score. Semantic retrieval was reliable under moderate pressure.','Category fluency is trainable. Repeated timed retrieval strengthens the speed and efficiency of semantic access.','The categories that challenge you most provide the strongest training signal.']
        :['Verbal fluency is highly state-dependent. Fatigue, cognitive load, and focus all affect retrieval speed meaningfully.','The value of this task is in tracking change across sessions — a single session is a data point, not a verdict.','Difficulty with near-category lures suggests the inhibition pathway is working hard, which responds well to practice.'];
      fi2.innerHTML=lines.map(l=>'<li>'+l+'</li>').join('');
    }
  },620);
}

const HIST_KEY='brainnovation_wordweaver_v1';
const HIST_MAX=3;
function histLoad(){try{const r=localStorage.getItem(HIST_KEY);if(!r)return[];const p=JSON.parse(r);return Array.isArray(p)?p:[];}catch(e){return[];}}
function histSave(s){try{localStorage.setItem(HIST_KEY,JSON.stringify(s));}catch(e){}}
function histCommit(total,roundScores,roundData,ageBracket){
  const prev=histLoad();
  const entry={ts:Date.now(),overall:total,rounds:roundScores.slice(),categories:(roundData||[]).map(d=>d?d.category:''),ageBracket};
  histSave([entry,...prev].slice(0,HIST_MAX));
}
function histFormatDate(ts){if(!ts)return'';const d=new Date(ts),dn=new Date(),diff=Math.floor((dn-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';if(diff<7)return diff+'d ago';return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}

function renderFinalHistory(currentTotal,currentRounds){
  const container=$('histfinal');if(!container)return;
  const history=histLoad();
  const prev_sessions=history.slice(0,HIST_MAX-1).map(s=>({...s,isCurrent:false}));
  const displaySessions=[{ts:Date.now(),overall:currentTotal,rounds:currentRounds.slice(),isCurrent:true},...prev_sessions];
  if(displaySessions.length<2){
    container.innerHTML='<p class="hist-final-title">Session History</p><p class="hist-no-history">Complete a second session to start tracking your fluency score over time.</p>';
    return;
  }
  const prev=displaySessions[1];
  const diff=currentTotal-prev.overall;
  const flat=Math.abs(diff)<2;
  let trendHtml='';
  if(!flat){
    const cls=diff>0?'up':'down';
    const lbl=diff>0?'↑ +'+diff+' words improved':'↓ '+Math.abs(diff)+' words';
    trendHtml='<div class="hist-trend-badge '+cls+'">'+lbl+' since last session</div>';
  }
  let analysisHtml='';
  if(!flat){
    const note=diff>0
      ?'An improvement of '+diff+' words. Stronger semantic retrieval speed or fewer decoy errors produced the gain.'
      :'A decrease of '+Math.abs(diff)+' words. Daily fluency fluctuates with sleep, cognitive load, and attentional state. A single session difference is not clinically meaningful — the trend across three or more sessions is what matters.';
    analysisHtml='<div class="hist-analysis-wrap"><p class="hist-analysis-label">What changed</p><p class="hist-analysis-text">'+note+'</p></div>';
  }
  const rows=displaySessions.map(s=>{
    const rChips=(s.rounds||[]).map((r,i)=>'<span class="hist-ph-chip'+(r>=5?' good':'')+'">R'+(i+1)+': '+r+'</span>').join('');
    const color=s.overall>=15?'var(--teal)':s.overall>=9?'var(--gold)':'var(--text-dim)';
    return'<div class="hist-session-row'+(s.isCurrent?' is-current':'')+'">'+
      '<div class="hist-row-top"><span class="hist-row-score" style="color:'+color+'">'+s.overall+' words</span>'+
      '<div class="hist-row-meta"><span class="hist-row-date">'+histFormatDate(s.ts)+'</span>'+
      '<span class="hist-row-tag '+(s.isCurrent?'now':'prev')+'">'+(s.isCurrent?'This session':'Previous')+'</span></div></div>'+
      '<div class="hist-phase-chips">'+rChips+'</div></div>';
  }).join('');
  container.innerHTML='<p class="hist-final-title">Session History</p>'+trendHtml+rows+analysisHtml;
}

function countdown(cb){
  const wrap=$('cntWrap'),el=$('cntN');wrap.classList.add('on');let n=3;
  const tick=()=>{
    el.textContent=n>0?n:'GO';el.style.color=n>0?'var(--text-faint)':'var(--teal)';
    el.className='countdown-n pop';setTimeout(()=>el.className='countdown-n',560);
    if(n===0){setTimeout(()=>{wrap.classList.remove('on');cb();},630);}else{n--;setTimeout(tick,660);}
  };tick();
}

document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    stopTimer();
  } else {
    // Resume if a round is active — shift timerStart forward by time hidden
    if(gs.round>=0&&gs.round<ROUNDS.length&&gs.timerRaf===null){
      // Re-attach RAF tick without resetting start — timer was paused so no elapsed drift
      // Simple approach: just restart timer from current progress
      const elapsed=now()-gs.timerStart;
      if(elapsed<gs.timerDuration){
        const fill=$('gtimer'+gs.round);
        function tick(){
          const e2=now()-gs.timerStart;
          const pct=Math.max(0,1-e2/gs.timerDuration);
          if(fill){fill.style.transform='scaleX('+pct+')';fill.className='timer-fill'+(pct<0.25?' danger':pct<0.5?' warn':'');}
          if(e2>=gs.timerDuration){endRound(gs.round,'timeout');return;}
          gs.timerRaf=requestAnimationFrame(tick);
        }
        gs.timerRaf=requestAnimationFrame(tick);
        gs.floodTimer=setInterval(()=>floodTile(gs.round),ROUNDS[gs.round].floodInterval);
      }
    }
  }
});

function buildSlides(){
  const deck=$('deck');
  slides.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    if(s.t==='game')div.classList.add('game-slide');
    div.dataset.idx=i;
    if(s.t==='hero')div.innerHTML=htmlHero();
    else if(s.t==='howto')div.innerHTML=htmlHowto();
    else if(s.t==='age')div.innerHTML=htmlAge();
    else if(s.t==='game')div.innerHTML=htmlGame(s.i);
    else if(s.t==='result')div.innerHTML=htmlResult(s.i);
    else if(s.t==='final')div.innerHTML=htmlFinal();
    deck.appendChild(div);
  });
}
buildSlides();
$('progFill').style.width='0%';
</script>
